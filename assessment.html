<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up | Next Genius</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #fafafa; color: #111; -webkit-font-smoothing: antialiased;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 32px 20px;
    }
    .container { max-width: 460px; width: 100%; }
    .logo { width: 80px; height: 80px; margin-bottom: 20px; }
    .card { background: #fff; border: 1px solid #eee; border-radius: 14px; padding: 32px; }
    h1 { font-family: 'Poppins', sans-serif; font-size: 22px; font-weight: 600; margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: #555; margin-bottom: 24px; line-height: 1.5; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
    .field input { width: 100%; padding: 11px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; outline: none; }
    .field input:focus { border-color: #FFC72C; }
    .btn {
      font-family: 'Poppins', sans-serif; font-size: 15px; font-weight: 500; color: #111;
      background: #FFC72C; border: none; border-radius: 999px;
      padding: 13px 32px; cursor: pointer; width: 100%;
    }
    .btn:hover:not(:disabled) { background: #F0B71F; }
    .btn:disabled { opacity: 0.5; cursor: wait; }
    .btn-google {
      background: #fff; border: 1px solid #ddd;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 13px;
    }
    .btn-google:hover:not(:disabled) { background: #fafafa; }
    .or-divider { text-align: center; font-size: 12px; color: #888; margin: 16px 0; position: relative; }
    .or-divider span { background: #fff; padding: 0 12px; position: relative; z-index: 1; }
    .or-divider hr { position: absolute; top: 50%; left: 0; right: 0; border: none; border-top: 1px solid #eee; }
    .err { color: #d93025; font-size: 13px; margin-top: 10px; text-align: center; }
    .pending-info { background: #fff7e0; border: 1px solid #FFE08F; border-radius: 8px; padding: 12px 14px; font-size: 13px; color: #444; margin-bottom: 20px; }
    .pending-info strong { color: #111; }
    .footer { text-align: center; margin-top: 24px; padding-top: 20px; border-top: 1px solid #f0f0f0; font-size: 13px; color: #666; }
    .footer a { color: #E8A020; font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <div id="noPendingGate" style="display:none;">
      <div class="card">
        <a href="index.html"><img class="logo" src="NG_Logo.avif" alt="Next Genius"></a>
        <h1>Start with the registration form</h1>
        <p class="subtitle">Please complete the registration first.</p>
        <a href="apply.html" class="btn" style="text-decoration:none; display:inline-block; text-align:center;">Go to Registration</a>
        <div class="footer">Already have an account? <a href="dashboard.html">Sign in</a></div>
      </div>
    </div>

    <div id="signupBlock" style="display:none;">
      <div class="card">
        <a href="index.html"><img class="logo" src="NG_Logo.avif" alt="Next Genius"></a>
        <h1>Create your account</h1>
        <p class="subtitle">One last step before your dashboard. Choose how you'd like to sign in.</p>

        <div class="pending-info">Account for: <strong id="pendingEmail"></strong></div>

        <button class="btn btn-google" onclick="signupWithGoogle()">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09 0-.73.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>

        <div class="or-divider"><span>or</span><hr></div>

        <div class="field"><label>Set a password (8+ characters)</label><input type="password" id="signupPassword"></div>
        <button class="btn" onclick="signupWithEmail()">Create Account with Email</button>
        <div id="signupErr" class="err"></div>

        <div class="footer">Already have an account? <a href="dashboard.html">Sign in</a></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";
    const firebaseConfig = {
      apiKey: "AIzaSyAf7Pv2zEaM3eVMqM7QGQCXBPruU0tgmFg",
      authDomain: "next-genius-auto.firebaseapp.com",
      projectId: "next-genius-auto",
      storageBucket: "next-genius-auto.firebasestorage.app",
      messagingSenderId: "557092273631",
      appId: "1:557092273631:web:192264bb43324a69a4186a"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let pendingReg = null;
    try { pendingReg = JSON.parse(sessionStorage.getItem('ng_pending') || 'null'); } catch(_) {}
    if (!pendingReg) {
      document.getElementById('noPendingGate').style.display = 'block';
    } else {
      document.getElementById('signupBlock').style.display = 'block';
      document.getElementById('pendingEmail').textContent = pendingReg.email;
    }

    window.signupWithGoogle = async function() {
      try { const cred = await signInWithPopup(auth, provider); await finalizeSignup(cred.user); }
      catch (e) { document.getElementById('signupErr').textContent = e.message.replace('Firebase: ',''); }
    };
    window.signupWithEmail = async function() {
      const pw = document.getElementById('signupPassword').value;
      if (pw.length < 8) { document.getElementById('signupErr').textContent = 'Password must be at least 8 characters'; return; }
      try {
        const cred = await createUserWithEmailAndPassword(auth, pendingReg.email, pw);
        await finalizeSignup(cred.user);
      } catch (e) {
        if (e.code === 'auth/email-already-in-use') {
          document.getElementById('signupErr').innerHTML = 'This email is already registered. <a href="dashboard.html" style="color:#E8A020;">Sign in →</a>';
        } else {
          document.getElementById('signupErr').textContent = e.message.replace('Firebase: ','');
        }
      }
    };
    const ADMIN_EMAILS = ['dknmsquad@gmail.com', 'mandhana.neeraj@gmail.com'];
    async function finalizeSignup(user) {
      if (ADMIN_EMAILS.includes((user.email || '').toLowerCase())) {
        document.getElementById('signupErr').textContent = 'This is an admin account, not for student registration. Please use a different email.';
        try { await user.delete(); } catch(_) {}
        return;
      }
      const enriched = {
        ...pendingReg,
        uid: user.uid,
        email: user.email || pendingReg.email,
        firstName: pendingReg.firstName || (user.displayName || '').split(' ')[0] || '',
        lastName: pendingReg.lastName || (user.displayName || '').split(' ').slice(1).join(' ') || '',
        photoURL: user.photoURL || null,
        createdAt: serverTimestamp(),
        source: "next-genius.pages.dev",
        status: "registered",
        onboarding: { photo: !!user.photoURL, personal: false, academic: false, inventory: false, college: false, interview: false, groupInterview: false, decision: false }
      };
      await setDoc(doc(db, "applicants", user.uid), enriched);
      // Fire-and-forget welcome email via Apps Script (Gmail-sent, branded HTML)
      const SHEET_WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbwVxIhz6N-vUNVhpTJOw2rFOfO8ZZOcsbL9JOj7-Ha2eWY7YEFlB6R-Ptg9PNC7NmT-xQ/exec";
      const url = SHEET_WEBHOOK_URL + "?welcome_email=" + encodeURIComponent(enriched.email) + "&firstName=" + encodeURIComponent(enriched.firstName || '');
      fetch(url, { mode: "no-cors" }).catch(()=>{});
      sessionStorage.removeItem('ng_pending');
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
