<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apply | Next Genius</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #fff;
      color: #111;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 24px;
    }
    .container { max-width: 520px; width: 100%; }
    .logo { width: 80px; height: 80px; margin-bottom: 24px; cursor: pointer; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: #555; margin-bottom: 28px; }

    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: 14px; font-weight: 500; color: #111; margin-bottom: 6px; }
    .field input {
      width: 100%; padding: 11px 14px; font-size: 15px;
      font-family: inherit; border: 1px solid #ddd; border-radius: 8px;
      background: #fff; color: #111; outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: #FFC72C; }
    .field.error input { border-color: #d93025; }
    .field .error-msg { font-size: 12px; color: #d93025; margin-top: 4px; }

    .submit-btn {
      width: 100%;
      font-family: inherit; font-size: 16px; font-weight: 600; color: #111;
      background: #FFC72C; border: none; border-radius: 999px;
      padding: 13px 32px; cursor: pointer; margin-top: 12px;
      transition: background 0.2s;
    }
    .submit-btn:hover:not(:disabled) { background: #F0B71F; }
    .submit-btn:disabled { opacity: 0.6; cursor: wait; }

    .success { text-align: center; padding: 40px 0; }
    .success .check {
      width: 56px; height: 56px; border-radius: 50%; background: #FFC72C;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 18px; font-size: 26px; color: #111;
    }
    .success h3 { font-size: 20px; margin-bottom: 8px; }
    .success p { font-size: 15px; color: #555; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html"><img class="logo" src="NG_Logo.avif" alt="Next Genius"></a>

    <div id="formContent">
      <h1>Registration</h1>
      <p class="subtitle">The Next Genius Scholarship Program</p>

      <div class="field" id="f-firstName">
        <label>Student First Name</label>
        <input type="text" id="firstName" autocomplete="given-name">
      </div>
      <div class="field" id="f-lastName">
        <label>Family Name</label>
        <input type="text" id="lastName" autocomplete="family-name">
      </div>
      <div class="field" id="f-city">
        <label>City</label>
        <input type="text" id="city" autocomplete="address-level2">
      </div>
      <div class="field" id="f-school">
        <label>School</label>
        <input type="text" id="school">
      </div>
      <div class="field" id="f-email">
        <label>Student Email ID</label>
        <input type="email" id="email" autocomplete="email">
      </div>
      <div class="field" id="f-whatsapp">
        <label>Student WhatsApp Number</label>
        <input type="tel" id="whatsapp" autocomplete="tel">
      </div>

      <button class="submit-btn" onclick="submitForm()">Submit</button>
    </div>

    <div id="successMsg" class="success" style="display:none;">
      <div class="check">&#10003;</div>
      <h3>Registration submitted</h3>
      <p id="successText"></p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";
    const firebaseConfig = {
      apiKey: "AIzaSyAf7Pv2zEaM3eVMqM7QGQCXBPruU0tgmFg",
      authDomain: "next-genius-auto.firebaseapp.com",
      projectId: "next-genius-auto",
      storageBucket: "next-genius-auto.firebasestorage.app",
      messagingSenderId: "557092273631",
      appId: "1:557092273631:web:192264bb43324a69a4186a"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const SHEET_WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbxDrGKVAFa76WvmkAu1ULc0kLBNR27R3ZGH0KbNNYcwTzsIHX9oHNhkE-DG0GzGtRKANA/exec";

    window.__saveApplicant = async function(payload) {
      const enriched = { ...payload, createdAt: serverTimestamp(), source: "next-genius.pages.dev", status: "registered" };
      const tasks = [ addDoc(collection(db, "applicants"), enriched) ];
      tasks.push(fetch(SHEET_WEBHOOK_URL, { method: "POST", mode: "no-cors", headers: { "Content-Type": "text/plain" }, body: JSON.stringify({ ...payload, createdAt: new Date().toISOString(), status: "registered" }) }));
      return Promise.allSettled(tasks);
    };
  </script>
  <script>
    async function submitForm() {
      document.querySelectorAll('.field').forEach(f => { f.classList.remove('error'); const em = f.querySelector('.error-msg'); if (em) em.remove(); });
      let valid = true;
      const fields = [
        ['f-firstName','firstName','First name is required'],
        ['f-lastName','lastName','Family name is required'],
        ['f-city','city','City is required'],
        ['f-school','school','School is required'],
        ['f-email','email','Email is required'],
        ['f-whatsapp','whatsapp','WhatsApp number is required']
      ];
      fields.forEach(([fId, inputId, msg]) => {
        if (!document.getElementById(inputId).value.trim()) { markError(fId, msg); valid = false; }
      });
      const email = document.getElementById('email').value.trim();
      if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { markError('f-email', 'Enter a valid email'); valid = false; }
      if (!valid) { document.querySelector('.field.error')?.scrollIntoView({ behavior: 'smooth', block: 'center' }); return; }

      const payload = {
        firstName: document.getElementById('firstName').value.trim(),
        lastName: document.getElementById('lastName').value.trim(),
        city: document.getElementById('city').value.trim(),
        school: document.getElementById('school').value.trim(),
        email: email,
        whatsapp: document.getElementById('whatsapp').value.trim()
      };
      const btn = document.querySelector('.submit-btn');
      btn.disabled = true; btn.textContent = 'Submitting...';
      try { await window.__saveApplicant(payload); }
      catch (err) { console.error(err); alert('Submission failed. Please try again.'); btn.disabled = false; btn.textContent = 'Submit'; return; }
      document.getElementById('successText').textContent = 'Thank you, ' + payload.firstName + '. We will be in touch shortly.';
      document.getElementById('formContent').style.display = 'none';
      document.getElementById('successMsg').style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    function markError(fieldId, msg) {
      const f = document.getElementById(fieldId);
      f.classList.add('error');
      const d = document.createElement('div');
      d.className = 'error-msg';
      d.textContent = msg;
      f.appendChild(d);
    }
  </script>
</body>
</html>
