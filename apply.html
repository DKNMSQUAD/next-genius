<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apply | Next Genius</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #fff;
      color: #111;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 24px;
    }
    .container { max-width: 520px; width: 100%; }
    .logo { width: 80px; height: 80px; margin-bottom: 24px; cursor: pointer; }
    h1 { font-family: 'Poppins', sans-serif; font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { font-size: 16px; color: #000; margin-bottom: 28px; }

    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: 14px; font-weight: 500; color: #111; margin-bottom: 6px; }
    .field label .req { color: #d93025; margin-left: 2px; }
    .field input, .field select {
      width: 100%; padding: 11px 14px; font-size: 15px;
      font-family: inherit; border: 1px solid #ddd; border-radius: 8px;
      background: #fff; color: #111; outline: none;
      transition: border-color 0.15s;
      appearance: none; -webkit-appearance: none;
    }
    .field select {
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%23666' d='M6 8L0 0h12z'/></svg>");
      background-repeat: no-repeat; background-position: right 14px center;
      padding-right: 38px;
    }
    .field input:focus, .field select:focus { border-color: #FFC72C; }
    .field.error input, .field.error select { border-color: #d93025; }
    .field .error-msg { font-size: 12px; color: #d93025; margin-top: 4px; }

    .submit-btn {
      width: 100%;
      font-family: 'Poppins', sans-serif; font-size: 18px; font-weight: 500; color: #000;
      background: #FFC72C; border: none; border-radius: 999px;
      padding: 14px 32px; cursor: pointer; margin-top: 12px;
      transition: background 0.2s;
    }
    .submit-btn:hover:not(:disabled) { background: #F0B71F; }
    .submit-btn:disabled { opacity: 0.6; cursor: wait; }

    .success { text-align: center; padding: 40px 0; }
    .success .check {
      width: 56px; height: 56px; border-radius: 50%; background: #FFC72C;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 18px; font-size: 26px; color: #111;
    }
    .success h3 { font-size: 20px; margin-bottom: 8px; }
    .success p { font-size: 15px; color: #555; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html"><img class="logo" src="NG_Logo.avif" alt="Next Genius"></a>

    <div id="formContent">
      <h1>Registration</h1>
      <p class="subtitle">The Next Genius Scholarship Program</p>

      <div class="field" id="f-firstName">
        <label>Student First Name <span class="req">*</span></label>
        <input type="text" id="firstName" autocomplete="given-name">
      </div>
      <div class="field" id="f-lastName">
        <label>Family Name <span class="req">*</span></label>
        <input type="text" id="lastName" autocomplete="family-name">
      </div>
      <div class="field" id="f-city">
        <label>City <span class="req">*</span></label>
        <select id="city" onchange="onCityChange()">
          <option value="">Select your city</option>
          <option>Agra</option><option>Ahmedabad</option><option>Ajmer</option><option>Aligarh</option><option>Allahabad (Prayagraj)</option><option>Amravati</option><option>Amritsar</option><option>Asansol</option><option>Aurangabad</option><option>Bangalore (Bengaluru)</option><option>Bareilly</option><option>Belgaum</option><option>Bhavnagar</option><option>Bhilai</option><option>Bhopal</option><option>Bhubaneswar</option><option>Bikaner</option><option>Bilaspur</option><option>Chandigarh</option><option>Chennai</option><option>Coimbatore</option><option>Cuttack</option><option>Dehradun</option><option>Delhi</option><option>Dhanbad</option><option>Durgapur</option><option>Erode</option><option>Faridabad</option><option>Firozabad</option><option>Ghaziabad</option><option>Goa (Panaji)</option><option>Gorakhpur</option><option>Gulbarga</option><option>Guntur</option><option>Gurgaon (Gurugram)</option><option>Guwahati</option><option>Gwalior</option><option>Howrah</option><option>Hubli–Dharwad</option><option>Hyderabad</option><option>Indore</option><option>Jabalpur</option><option>Jaipur</option><option>Jalandhar</option><option>Jammu</option><option>Jamnagar</option><option>Jamshedpur</option><option>Jhansi</option><option>Jodhpur</option><option>Kakinada</option><option>Kalyan-Dombivli</option><option>Kanpur</option><option>Kochi (Cochin)</option><option>Kolhapur</option><option>Kolkata</option><option>Kollam</option><option>Kota</option><option>Kozhikode (Calicut)</option><option>Lucknow</option><option>Ludhiana</option><option>Madurai</option><option>Malegaon</option><option>Mangalore</option><option>Mathura</option><option>Meerut</option><option>Moradabad</option><option>Mumbai</option><option>Mysore (Mysuru)</option><option>Nagpur</option><option>Nanded</option><option>Nashik</option><option>Navi Mumbai</option><option>Nellore</option><option>Noida</option><option>Patna</option><option>Pondicherry (Puducherry)</option><option>Pune</option><option>Raipur</option><option>Rajahmundry</option><option>Rajkot</option><option>Ranchi</option><option>Rourkela</option><option>Saharanpur</option><option>Salem</option><option>Sangli</option><option>Shimla</option><option>Siliguri</option><option>Solapur</option><option>Srinagar</option><option>Surat</option><option>Thane</option><option>Thiruvananthapuram (Trivandrum)</option><option>Thrissur</option><option>Tiruchirappalli (Trichy)</option><option>Tirunelveli</option><option>Tirupati</option><option>Tiruppur</option><option>Udaipur</option><option>Ujjain</option><option>Vadodara</option><option>Varanasi</option><option>Vasai-Virar</option><option>Vijayawada</option><option>Visakhapatnam (Vizag)</option><option>Warangal</option>
          <option value="International">International</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="field" id="f-cityOther" style="display:none;">
        <label id="cityOtherLabel">Please specify your city <span class="req">*</span></label>
        <input type="text" id="cityOther">
      </div>
      <div class="field" id="f-school">
        <label>School <span class="req">*</span></label>
        <input type="text" id="school">
      </div>
      <div class="field" id="f-email">
        <label>Student Email ID <span class="req">*</span></label>
        <input type="email" id="email" autocomplete="email">
      </div>
      <div class="field" id="f-whatsapp">
        <label>Student WhatsApp Number <span class="req">*</span></label>
        <input type="tel" id="whatsapp" autocomplete="tel">
      </div>

      <button class="submit-btn" onclick="submitForm()">Submit</button>
    </div>

    <div id="successMsg" class="success" style="display:none;">
      <div class="check">&#10003;</div>
      <h3>Registration submitted</h3>
      <p id="successText"></p>
    </div>
  </div>

  <script>
    const SHEET_WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbxDrGKVAFa76WvmkAu1ULc0kLBNR27R3ZGH0KbNNYcwTzsIHX9oHNhkE-DG0GzGtRKANA/exec";
    window.__saveApplicant = async function(payload) {
      sessionStorage.setItem('ng_pending', JSON.stringify({ ...payload, createdAt: new Date().toISOString() }));
      fetch(SHEET_WEBHOOK_URL, { method: "POST", mode: "no-cors", headers: { "Content-Type": "text/plain" }, body: JSON.stringify({ ...payload, createdAt: new Date().toISOString(), status: "registered" }) }).catch(()=>{});
      return { saved: true };
    };
  </script>
  <script>
    function onCityChange() {
      const v = document.getElementById('city').value;
      const wrap = document.getElementById('f-cityOther');
      const lbl = document.getElementById('cityOtherLabel');
      const showIt = (v === 'International' || v === 'Other');
      wrap.style.display = showIt ? 'block' : 'none';
      if (showIt) {
        lbl.innerHTML = (v === 'International' ? 'Country &amp; city' : 'Please specify your city') + ' <span class="req">*</span>';
      } else {
        document.getElementById('cityOther').value = '';
      }
    }
    async function submitForm() {
      document.querySelectorAll('.field').forEach(f => { f.classList.remove('error'); const em = f.querySelector('.error-msg'); if (em) em.remove(); });
      let valid = true;
      const fields = [
        ['f-firstName','firstName','First name is required'],
        ['f-lastName','lastName','Family name is required'],
        ['f-city','city','Please select a city'],
        ['f-school','school','School is required'],
        ['f-email','email','Email is required'],
        ['f-whatsapp','whatsapp','WhatsApp number is required']
      ];
      fields.forEach(([fId, inputId, msg]) => {
        if (!document.getElementById(inputId).value.trim()) { markError(fId, msg); valid = false; }
      });
      const cityVal = document.getElementById('city').value;
      if ((cityVal === 'International' || cityVal === 'Other') && !document.getElementById('cityOther').value.trim()) {
        markError('f-cityOther', 'Please specify your ' + (cityVal === 'International' ? 'country & city' : 'city'));
        valid = false;
      }
      const email = document.getElementById('email').value.trim();
      if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { markError('f-email', 'Enter a valid email'); valid = false; }
      if (!valid) { document.querySelector('.field.error')?.scrollIntoView({ behavior: 'smooth', block: 'center' }); return; }

      const cityRaw = document.getElementById('city').value;
      const cityOther = document.getElementById('cityOther').value.trim();
      const cityFinal = (cityRaw === 'International' || cityRaw === 'Other') ? (cityRaw + ': ' + cityOther) : cityRaw;
      const payload = {
        firstName: document.getElementById('firstName').value.trim(),
        lastName: document.getElementById('lastName').value.trim(),
        city: cityFinal,
        school: document.getElementById('school').value.trim(),
        email: email,
        whatsapp: document.getElementById('whatsapp').value.trim()
      };
      const btn = document.querySelector('.submit-btn');
      btn.disabled = true; btn.textContent = 'Submitting...';
      try { await window.__saveApplicant(payload); }
      catch (err) { console.error(err); alert('Submission failed. Please try again.'); btn.disabled = false; btn.textContent = 'Submit'; return; }
      window.location.href = 'assessment.html';
    }
    function markError(fieldId, msg) {
      const f = document.getElementById(fieldId);
      f.classList.add('error');
      const d = document.createElement('div');
      d.className = 'error-msg';
      d.textContent = msg;
      f.appendChild(d);
    }
  </script>
</body>
</html>
