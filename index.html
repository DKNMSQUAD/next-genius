<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Next Genius Scholarship Program</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #fff;
      color: #000;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }
    .container { max-width: 760px; width: 100%; }
    .logo { width: 120px; height: 120px; margin-bottom: 40px; }
    h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 18px;
      font-weight: 600;
      color: #000;
      line-height: 1.4;
      margin-bottom: 2px;
    }
    .est {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 18px;
      font-weight: 400;
      color: #000;
      margin-bottom: 32px;
    }
    p {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 18px;
      line-height: 1.55;
      color: #000;
      font-weight: 400;
      margin-bottom: 56px;
      max-width: 720px;
    }
    .apply-btn {
      display: inline-block;
      font-family: 'Poppins', sans-serif;
      font-size: 18px;
      font-weight: 500;
      color: #000;
      background: #FFC72C;
      border: none;
      border-radius: 999px;
      padding: 14px 56px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .apply-btn:hover { background: #F0B71F; }

    @media (max-width: 600px) {
      body { padding: 32px 20px; }
      .logo { width: 96px; height: 96px; margin-bottom: 32px; }
      h1, .est, p { font-size: 16px; }
      p { margin-bottom: 40px; }
      .apply-btn { font-size: 16px; padding: 12px 44px; }
    }
  </style>
</head>
<body>
  <a href="dashboard.html" style="position:fixed; top:20px; right:24px; font-family:'Poppins', sans-serif; font-size:14px; font-weight:500; color:#111; text-decoration:none; padding:8px 18px; border:1px solid #ddd; border-radius:999px; background:#fff;">Sign in</a>
  <div class="container">
    <img class="logo" src="NG_Logo.avif" alt="Next Genius">
    <h1><strong>The Next Genius Scholarship Program</strong></h1>
    <div class="est">Est. 2014</div>
    <p>We award full and partial tuition scholarships to select high-performing, middle-income high school students from India to attend leading global colleges. Since 2014, we have empowered 351 scholar changemakers. Are you the Next Genius?</p>
    <a href="apply.html" class="apply-btn">Apply</a>
  </div>
</body>
</html>
