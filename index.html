<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Next Genius Scholarship Program</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #fff;
      color: #111;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }
    .container {
      max-width: 720px;
      width: 100%;
    }
    .logo {
      width: 110px;
      height: 110px;
      margin-bottom: 36px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #111;
      margin-bottom: 4px;
    }
    .est {
      font-size: 16px;
      color: #333;
      margin-bottom: 28px;
    }
    p {
      font-size: 16px;
      line-height: 1.65;
      color: #222;
      margin-bottom: 40px;
      max-width: 640px;
    }
    .apply-btn {
      display: inline-block;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: #111;
      background: #FFC72C;
      border: none;
      border-radius: 999px;
      padding: 14px 44px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }
    .apply-btn:hover { background: #F0B71F; transform: translateY(-1px); }

    @media (max-width: 600px) {
      body { padding: 32px 20px; }
      .logo { width: 90px; height: 90px; margin-bottom: 28px; }
      h1 { font-size: 20px; }
      p { font-size: 15px; margin-bottom: 32px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <img class="logo" src="NG_Logo.avif" alt="Next Genius">
    <h1>The Next Genius Scholarship Program</h1>
    <div class="est">Est. 2014</div>
    <p>We award full and partial tuition scholarships to select high-performing, middle-income high school students from India to attend leading global colleges. Since 2014, we have empowered 351 scholar changemakers. Are you the Next Genius?</p>
    <a href="apply.html" class="apply-btn">Apply</a>
  </div>
</body>
</html>
